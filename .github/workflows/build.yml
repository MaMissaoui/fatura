name: "publish"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-wails:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        settings:
          - platform: "macos-latest"
            args: "-platform darwin/arm64"
          - platform: "macos-latest"
            args: "-platform darwin/amd64"
          - platform: "ubuntu-24.04"
            args: "-platform linux/amd64"

    runs-on: ${{ matrix.settings.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.settings.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with Wails
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: wails build ${{ matrix.settings.args }}

      - name: Upload macOS artifact
        if: matrix.settings.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: fatura-${{ matrix.settings.args }}
          path: build/bin/

      - name: Upload Linux artifact
        if: matrix.settings.platform == 'ubuntu-24.04'
        uses: actions/upload-artifact@v4
        with:
          name: fatura-linux-amd64
          path: build/bin/
